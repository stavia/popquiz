<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1b4b">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <title>PopQuiz - Aprende Inglés</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e1b4b;
            --bg-3: #312e81;
            --surface: rgba(255, 255, 255, 0.06);
            --surface-2: rgba(255, 255, 255, 0.09);
            --border: rgba(255, 255, 255, 0.12);
            --border-strong: rgba(255, 255, 255, 0.22);
            --text: #f8fafc;
            --text-muted: rgba(248, 250, 252, 0.7);
            --accent: #fbbf24;
            --accent-glow: rgba(251, 191, 36, 0.35);
            --mint: #5eead4;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-pill: 999px;
            --select-bg: #312e81;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: var(--bg-1);
            background-image:
                radial-gradient(ellipse 120% 80% at 50% -20%, rgba(99, 102, 241, 0.35), transparent),
                radial-gradient(ellipse 80% 50% at 100% 40%, rgba(45, 212, 191, 0.1), transparent),
                linear-gradient(165deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: var(--text);
            padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 56px 18px 28px;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            max-width: 560px;
            width: 100%;
            position: relative;
        }

        @media (min-width: 480px) {
            .container {
                padding: 60px 28px 36px;
            }
        }

        @media (min-width: 768px) {
            .container {
                padding: 64px 36px 40px;
            }
        }

        .quiz-header {
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
            text-shadow: 0 2px 24px rgba(0, 0, 0, 0.35);
            line-height: 1.2;
        }

        @media (min-width: 480px) {
            h1 {
                font-size: 1.65rem;
            }
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 1.85rem;
            }
        }

        .flashcard-panel {
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px 14px 18px;
            margin-top: 16px;
        }

        @media (min-width: 480px) {
            .flashcard-panel {
                padding: 28px 22px 22px;
                margin-top: 20px;
            }
        }

        .word-container {
            margin: 0;
            min-height: 108px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            overflow: hidden;
        }

        @media (min-width: 480px) {
            .word-container {
                min-height: 128px;
            }
        }

        .origin-word {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent);
            text-shadow: 0 2px 16px var(--accent-glow);
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            padding: 0 8px;
            line-height: 1.35;
            max-width: 100%;
            letter-spacing: -0.02em;
        }

        @media (min-width: 480px) {
            .origin-word {
                font-size: 1.65rem;
                margin-bottom: 14px;
            }
        }

        @media (min-width: 768px) {
            .origin-word {
                font-size: 1.55rem;
            }
        }

        .result-word {
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.45s ease;
            color: var(--text);
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            padding: 0 8px;
            line-height: 1.4;
            max-width: 100%;
        }

        @media (min-width: 480px) {
            .result-word {
                font-size: 1.4rem;
            }
        }

        @media (min-width: 768px) {
            .result-word {
                font-size: 1.35rem;
            }
        }

        .result-word.show {
            opacity: 1;
        }

        .timer-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin: 18px 0 6px;
        }

        .timer {
            font-size: 0.875rem;
            font-weight: 600;
            margin: 0;
            color: var(--accent);
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.28);
            padding: 10px 18px;
            border-radius: var(--radius-pill);
            letter-spacing: 0.02em;
        }

        #nextWordTimer {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-pill);
            margin: 16px 0 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--mint), var(--accent));
            width: 0%;
            transition: width 0.1s linear;
            border-radius: var(--radius-pill);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .controls {
            margin-top: 22px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (min-width: 420px) {
            .controls {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }

        @media (min-width: 520px) {
            .controls {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
        }

        button {
            font-family: inherit;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 600;
            margin: 0;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            width: auto;
            min-height: 44px;
        }

        @media (min-width: 480px) {
            button {
                padding: 12px 18px;
                font-size: 0.875rem;
            }
        }

        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.14);
            border-color: var(--border-strong);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:focus {
            outline: none;
        }

        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .stats {
            margin-top: 22px;
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .stats p {
            margin: 0.35rem 0;
        }

        #currentLevel {
            color: var(--accent);
            font-weight: 700;
        }

        #reviewModeInfo {
            display: none;
            font-size: 0.8125rem;
            padding: 12px 14px;
            margin-top: 10px;
            background: rgba(94, 234, 212, 0.08);
            border: 1px solid rgba(94, 234, 212, 0.25);
            border-radius: var(--radius-md);
            color: var(--text-muted);
            line-height: 1.5;
        }

        .time-selector {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.875rem;
        }

        @media (min-width: 400px) {
            .time-selector {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }

        .time-selector label {
            color: var(--text-muted);
            font-weight: 600;
        }

        .time-selector select,
        .review-selector select {
            font-family: inherit;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .time-selector select:hover,
        .review-selector select:hover {
            border-color: var(--border-strong);
            background: rgba(255, 255, 255, 0.12);
        }

        .time-selector select:focus-visible,
        .review-selector select:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .time-selector select option,
        .review-selector select option {
            background: var(--select-bg);
            color: var(--text);
        }

        .review-selector {
            margin-top: 14px;
            display: none;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            gap: 10px;
            font-size: 0.875rem;
            background: rgba(0, 0, 0, 0.25);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .review-selector label {
            color: var(--text);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .review-selector select {
            width: 100%;
            max-width: 100%;
            min-width: 0;
        }

        .audio-controls {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.28);
            padding: 14px 16px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .audio-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            min-width: 48px;
            min-height: 48px;
        }

        .audio-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.14);
            border-color: var(--border-strong);
            transform: scale(1.06);
        }

        .audio-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .audio-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .audio-btn:focus {
            outline: none;
        }

        .audio-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .audio-btn.playing {
            box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 24px rgba(0, 0, 0, 0.35);
            border-color: rgba(251, 191, 36, 0.45);
        }

        #saveFailedBtn {
            display: none;
            font-size: 1.15rem;
        }

        .home-btn {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            left: max(12px, env(safe-area-inset-left));
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 600;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            z-index: 1000;
            width: auto;
            white-space: nowrap;
            min-height: 40px;
        }

        @media (min-width: 480px) {
            .home-btn {
                padding: 10px 18px;
                font-size: 0.875rem;
                top: 16px;
                left: 16px;
            }
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: var(--border-strong);
        }

        .home-btn:active {
            transform: scale(0.97);
        }

        .home-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        @media (prefers-reduced-motion: reduce) {
            .result-word {
                transition: none;
            }

            button:active,
            .home-btn:active,
            .audio-btn:active {
                transform: none;
            }

            .audio-btn:hover:not(:disabled) {
                transform: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <button type="button" class="home-btn" onclick="window.location.href='index.html'">🏠 Inicio</button>

        <header class="quiz-header">
            <h1>🎓 PopQuiz Inglés</h1>
        </header>

        <section class="flashcard-panel" aria-label="Tarjeta actual">
            <div class="word-container">
                <div class="origin-word" id="originWord">Cargando...</div>
                <div class="result-word" id="resultWord"></div>
            </div>

            <div class="audio-controls" id="audioControls">
                <button type="button" class="audio-btn" onclick="showAnswer()" id="showAnswerBtn" title="Mostrar Respuesta" disabled>👁️</button>
                <button type="button" class="audio-btn" onclick="togglePlayPause()" id="playPauseBtn" data-icon="▶" disabled>▶</button>
                <button type="button" class="audio-btn" onclick="nextWord()" id="nextBtn" data-icon="⏭" title="Siguiente Palabra">⏭</button>
                <button type="button" class="audio-btn" onclick="saveFailedWord()" id="saveFailedBtn" title="Guardar Palabra Fallada">❌</button>
            </div>
        </section>

        <div class="timer-row">
            <div class="timer" id="timer">Tiempo restante: <span id="timeLeft">8</span>s</div>
            <div class="timer" id="nextWordTimer">Siguiente tarjeta en: <span id="nextWordCountdown">5</span>s</div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="controls">
            <button type="button" onclick="toggleAutoMode()" id="autoBtn">Modo Automático</button>
            <button type="button" onclick="toggleAuditoryMode()" id="auditoryBtn">100% Auditiva</button>
            <button type="button" onclick="toggleReviewMode()" id="reviewBtn">Repaso 25 Palabras</button>
            <button type="button" onclick="clearFailedWords()" id="clearFailedBtn">🗑️ Vaciar Fallidas</button>
        </div>

        <div class="review-selector" id="reviewSelector">
            <select id="reviewListSelect" onchange="selectReviewList()">
                <option value="">-- Selecciona un listado --</option>
            </select>
        </div>

        <div class="time-selector">
            <label for="responseTime">Tiempo para responder:</label>
            <select id="responseTime" onchange="changeResponseTime()">
                <option value="3">3 segundos</option>
                <option value="5">5 segundos</option>
                <option value="8">8 segundos</option>
                <option value="10" selected>10 segundos</option>
                <option value="12">12 segundos</option>
                <option value="15">15 segundos</option>
                <option value="20">20 segundos</option>
            </select>
        </div>

        <div class="stats">
            <p>Nivel: <span id="currentLevel">-</span></p>
            <p id="reviewModeInfo">
                📚 Modo Repaso: <span id="reviewListSize">25</span> palabras |
                Palabra <span id="reviewCardNumber">-</span> de <span id="reviewListTotal">25</span>
            </p>
        </div>
    </div>

    <script>
        // PWA: registrar service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            });
        }

        // Valor inicial (se ajusta luego con `responseTime` y modo auditivo al cargar el vocabulario).
        let timeLeft = 8;
        let timerInterval;
        let autoMode = false; // Modo automático desactivado por defecto
        let auditoryMode = false; // Modo auditivo desactivado por defecto
        let progressInterval;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        let isPlaying = false;
        let autoModeTimer = null;
        let nextWordCountdown = 5;
        let countdownInterval = null;
        let responseTime = 8; // Tiempo configurable en segundos

        // Wake Lock API (mantener pantalla activa en móviles; sin mensajes en UI).
        let wakeLock = null;
        let wakeLockWanted = false;

        function isLikelyIOS() {
            // Chrome/Firefox iOS también usan WebKit y comparten limitaciones.
            return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        }

        function isLikelyMobileDevice() {
            // Heurística simple: móviles/tablets o input "coarse".
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
        }

        function isWakeLockAutoDisabled() {
            try {
                return localStorage.getItem('popquiz_wakeLockDisabled') === '1';
            } catch (e) {
                return false;
            }
        }

        function setWakeLockAutoDisabled(disabled) {
            try {
                if (disabled) {
                    localStorage.setItem('popquiz_wakeLockDisabled', '1');
                } else {
                    localStorage.removeItem('popquiz_wakeLockDisabled');
                }
            } catch (e) {
                // Ignorar si storage no está disponible
            }
        }

        async function requestWakeLock() {
            if (!window.isSecureContext) {
                wakeLockWanted = false;
                return;
            }

            if (!('wakeLock' in navigator) || !navigator.wakeLock) {
                wakeLockWanted = false;
                return;
            }

            wakeLockWanted = true;
            try {
                wakeLock = await navigator.wakeLock.request('screen');

                wakeLock.addEventListener('release', () => {});
            } catch (err) {
                wakeLockWanted = false;
                console.log('Wake Lock error:', err);
            }
        }

        async function releaseWakeLock() {
            wakeLockWanted = false;
            try {
                if (wakeLock) {
                    await wakeLock.release();
                    wakeLock = null;
                }
            } catch (err) {
                console.log('Wake Lock release error:', err);
            }
        }

        async function toggleWakeLock() {
            if (wakeLockWanted || wakeLock) {
                // Si el usuario lo desactiva manualmente, no auto-activar después.
                setWakeLockAutoDisabled(true);
                await releaseWakeLock();
            } else {
                // Si el usuario lo activa manualmente, permitir auto-activación.
                setWakeLockAutoDisabled(false);
                await requestWakeLock();
            }
        }

        function setupWakeLock() {
            const isMobile = isLikelyMobileDevice();
            const shouldAutoEnable = isMobile && !isWakeLockAutoDisabled();

            // Si NO es móvil, no intentamos Wake Lock.
            if (!isMobile) {
                return;
            }

            // Auto-activar en móviles: pedir Wake Lock en el primer gesto del usuario.
            if (shouldAutoEnable) {
                const onFirstUserGesture = () => {
                    requestWakeLock();
                };

                document.addEventListener('click', onFirstUserGesture, { once: true, passive: true });
                document.addEventListener('touchstart', onFirstUserGesture, { once: true, passive: true });
                document.addEventListener('keydown', onFirstUserGesture, { once: true });
            }

            // Si el usuario vuelve a la pestaña, re-pedir el Wake Lock si estaba activo.
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && wakeLockWanted) {
                    requestWakeLock();
                }
            });
        }

        // Cargar nivel desde localStorage
        const savedLevel = localStorage.getItem('popquiz_level') || 'intermediate';

        // Dataset TSV local (siempre desde este repo)
        const DATASET_BASE = 'data/tsv/';

        function buildLevelFiles(base) {
            return {
                'beginner': `${base}book/beginner.tsv`,
                'vocabulario': `${base}vocabulary.tsv`,
                'intermediate': `${base}book/intermediate.tsv`,
                'advanced': `${base}book/advanced.tsv`,
                'linking_words': `${base}linking_words.tsv`,
                'conditionals': `${base}conditionals.tsv`,
                'pronunciation': `${base}pronunciation.tsv`,
                'custom': `${base}notebook.tsv`
            };
        }

        function getCandidateFilesForLevel(level) {
            const levelFiles = buildLevelFiles(DATASET_BASE);
            return [levelFiles[level] || levelFiles['custom']];
        }

        // Mapeo de nombres de nivel para mostrar
        const levelNames = {
            'beginner': 'Principiante',
            'vocabulario': 'Vocabulario',
            'intermediate': 'Intermedio',
            'advanced': 'Avanzado',
            'linking_words': 'Linking words',
            'conditionals': 'Conditionals',
            'pronunciation': 'Pronunciación',
            'custom': 'Personalizado'
        };

        // Cargar vocabulario según el nivel
        let vocabulary = [];
        let currentIndex = 0;
        let usedIndices = new Set(); // Rastrear las palabras ya usadas
        let reviewMode = false; // Modo de repaso de 25 palabras
        let reviewList = []; // Lista de 25 palabras para repaso
        let reviewUsedIndices = new Set(); // Índices usados dentro de la lista de repaso
        let failedWords = []; // Lista de palabras falladas guardadas

        // Función para cargar vocabulario desde el archivo TSV
        async function loadVocabularyFromFile(filename) {
            try {
                console.log('Loading vocabulary from:', filename);
                const response = await fetch(filename);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                const lines = text.split('\n').filter(line => line.trim());

                const vocab = lines.map(line => {
                    const parts = line.split('\t');
                    return {
                        origin: parts[0]?.trim() || '',
                        result: parts[1]?.trim() || ''
                    };
                }).filter(item => item.origin && item.result);

                console.log('Loaded vocabulary items:', vocab.length);
                return vocab;
            } catch (error) {
                console.error('Error loading vocabulary:', error);
                throw error; // Lanzar el error en lugar de retornar vocabulario vacío
            }
        }

        async function loadVocabularyFromFirstAvailable(filenames) {
            let lastError = null;
            for (const filename of filenames) {
                try {
                    const vocab = await loadVocabularyFromFile(filename);
                    return { vocab, source: filename };
                } catch (err) {
                    lastError = err;
                    console.warn('Failed to load vocabulary from:', filename, err);
                }
            }

            const error = new Error(
                `No se pudo cargar ningún dataset TSV. Probados:\n- ${filenames.join('\n- ')}`
            );
            error.cause = lastError;
            throw error;
        }


        function playAudio(language = 'result') {
            let text, lang, rate;

            if (language === 'origin') {
                text = document.getElementById('originWord').textContent;
                lang = 'es-ES';
                rate = 1.0;
            } else {
                text = document.getElementById('resultWord').textContent;
                lang = 'en-US';
                rate = 0.85;
            }

            if (!speechSynthesis) {
                alert('Tu navegador no soporta síntesis de voz');
                return;
            }

            // Cancelar cualquier audio anterior
            speechSynthesis.cancel();

            // Crear nueva utterance
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = lang;
            currentUtterance.rate = rate;
            currentUtterance.pitch = 1;

            if (language === 'origin') {
                selectVoiceForOrigin();
            } else {
                selectVoiceForResult();
            }

            // Eventos de control
            currentUtterance.onstart = function() {
                isPlaying = true;
                const btn = document.getElementById('playPauseBtn');
                btn.classList.add('playing');
                btn.textContent = '⏸';
            };

            currentUtterance.onend = function() {
                isPlaying = false;
                const btn = document.getElementById('playPauseBtn');
                btn.classList.remove('playing');
                btn.textContent = '▶';

                // Si está en modo automático y se reproduce inglés, iniciar timer para siguiente palabra
                if (autoMode && language === 'result') {
                    startAutoModeTimer();
                }
            };

            currentUtterance.onerror = function() {
                isPlaying = false;
                const btn = document.getElementById('playPauseBtn');
                btn.classList.remove('playing');
                btn.textContent = '▶';
                console.log('Error en síntesis de voz');
            };

            // Reproducir
            speechSynthesis.speak(currentUtterance);
        }

        function selectVoiceForOrigin() {
            const voices = speechSynthesis.getVoices();
            const spanishVoices = voices.filter(v => v.lang.startsWith('es-ES'));
            const googleVoice = spanishVoices.find(v => v.name.startsWith('Google'));
            if (googleVoice) {
                currentUtterance.voice = googleVoice;
            } else {
                const enhancedSpanishVoices = spanishVoices.filter(voice =>
                    (voice.name.includes('Enhanced')));
                if (enhancedSpanishVoices.length > 0) {
                    currentUtterance.voice = enhancedSpanishVoices[0];
                } else {
                    currentUtterance.voice = spanishVoices.find(v => v.name.includes('Marisol') ||
                        v.name.includes('Mónica'));
                }
            }
            console.log('Selected voice for origin:', currentUtterance.voice);
        }

        function selectVoiceForResult() {
            const voices = speechSynthesis.getVoices();
            const englishVoices = voices.filter(v => v.lang.startsWith('en-US'));
            const googleVoice = englishVoices.find(v => v.name.startsWith('Google'));
            if (googleVoice) {
                currentUtterance.voice = googleVoice;
            } else {
                const defaultEnglishVoices = englishVoices.filter(v => v.default === true);
                if (defaultEnglishVoices.length > 1) {
                    currentUtterance.voice = englishVoices.find(v =>
                        v.name.includes('Enhanced') ||
                        v.name.includes('Premium') ||
                        v.name === 'Samantha' ||
                        v.name === 'Alex'
                    ) || englishVoices[0];
                } else {
                    currentUtterance.voice = defaultEnglishVoices[0];
                }
            }
            console.log('Selected voice for result:', currentUtterance.voice);
        }

        function startTimer() {
            // Aumentar tiempo en modo auditivo para dar más tiempo para pensar
            // Usar responseTime configurado por el usuario
            const currentDelaySeconds = auditoryMode ? (responseTime + 4) : responseTime;
            timeLeft = currentDelaySeconds;
            document.getElementById('timeLeft').textContent = timeLeft;
            document.getElementById('resultWord').classList.remove('show');

            // Deshabilitar botones durante el timer
            document.getElementById('playPauseBtn').disabled = true;
            document.getElementById('showAnswerBtn').disabled = false;

            // Ocultar botón para guardar palabra fallada
            document.getElementById('saveFailedBtn').style.display = 'none';

            // Reiniciar barra de progreso
            document.getElementById('progressFill').style.width = '0%';

            // Reproducir automáticamente la palabra en español al inicio solo en modo auditivo
            if (auditoryMode) {
                setTimeout(() => {
                    playAudio('origin');
                }, 300); // Pequeño delay para que aparezca primero el texto
            }

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timeLeft').textContent = timeLeft;

                // Actualizar barra de progreso
                const progress = ((currentDelaySeconds - timeLeft) / currentDelaySeconds) * 100;
                document.getElementById('progressFill').style.width = progress + '%';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showAnswer();
                }
            }, 1000);
        }

        function nextWord() {
            clearInterval(timerInterval);

            // Limpiar timer del modo automático
            if (autoModeTimer) {
                clearTimeout(autoModeTimer);
                autoModeTimer = null;
            }

            // Limpiar cuenta regresiva
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }

            // Ocultar cuenta regresiva
            document.getElementById('nextWordTimer').style.display = 'none';

            // Detener cualquier audio que esté reproduciéndose
            speechSynthesis.cancel();
            document.getElementById('playPauseBtn').disabled = true;
            document.getElementById('showAnswerBtn').disabled = false;

            // Ocultar botón para guardar palabra fallada
            document.getElementById('saveFailedBtn').style.display = 'none';

            let selectedIndex;

            if (reviewMode && reviewList.length > 0) {
                // Modo de repaso: trabajar solo con las 25 palabras seleccionadas
                let availableInReview = [];
                for (let i = 0; i < reviewList.length; i++) {
                    if (!reviewUsedIndices.has(i)) {
                        availableInReview.push(i);
                    }
                }

                // Si ya se usaron todas las palabras del repaso, resetear
                if (availableInReview.length === 0) {
                    reviewUsedIndices = new Set();
                    availableInReview = [];
                    for (let i = 0; i < reviewList.length; i++) {
                        availableInReview.push(i);
                    }
                    // Evitar seleccionar la misma palabra que acabamos de ver
                    if (currentIndex >= 0 && reviewList.includes(currentIndex)) {
                        const currentReviewIndex = reviewList.indexOf(currentIndex);
                        availableInReview = availableInReview.filter(i => i !== currentReviewIndex);
                        if (availableInReview.length === 0) {
                            // Si solo había una palabra, resetear todo
                            availableInReview = Array.from({
                                length: reviewList.length
                            }, (_, i) => i);
                        }
                    }
                }

                // Seleccionar la siguiente palabra en orden (la primera disponible)
                // Como availableInReview está ordenado, esto asegura el orden secuencial
                const reviewIndex = availableInReview[0];
                selectedIndex = reviewList[reviewIndex];
                reviewUsedIndices.add(reviewIndex);

                // Actualizar estadísticas del modo repaso
                document.getElementById('reviewCardNumber').textContent = reviewUsedIndices.size;
                document.getElementById('reviewListTotal').textContent = reviewList.length;
                // Mostrar información del modo repaso
                document.getElementById('reviewModeInfo').style.display = 'block';
            } else {
                // Modo normal: trabajar con todo el vocabulario
                let availableIndices = [];
                for (let i = 0; i < vocabulary.length; i++) {
                    if (!usedIndices.has(i)) {
                        availableIndices.push(i);
                    }
                }

                // Si ya se usaron todas las palabras, resetea el conjunto
                if (availableIndices.length === 0) {
                    usedIndices = new Set([currentIndex]);
                    availableIndices = [];
                    for (let i = 0; i < vocabulary.length; i++) {
                        if (i !== currentIndex) {
                            availableIndices.push(i);
                        }
                    }
                }

                // Seleccionar una palabra aleatoria de las disponibles
                const randomAvailable = Math.floor(Math.random() * availableIndices.length);
                selectedIndex = availableIndices[randomAvailable];
                usedIndices.add(selectedIndex);

                // Ocultar información del modo repaso
                document.getElementById('reviewModeInfo').style.display = 'none';
            }

            currentIndex = selectedIndex;

            // Actualizar contenido
            // Ocultar la respuesta inmediatamente sin transición para evitar que se vea la nueva respuesta
            const resultElement = document.getElementById('resultWord');
            resultElement.style.transition = 'none';
            resultElement.classList.remove('show');
            resultElement.style.opacity = '0'; // Asegurar que esté oculto

            // Actualizar contenido
            document.getElementById('originWord').textContent = vocabulary[currentIndex].origin;
            resultElement.textContent = vocabulary[currentIndex].result;

            // Forzar reflow
            void resultElement.offsetWidth;

            // Restaurar transición
            resultElement.style.transition = '';
            resultElement.style.opacity = '';

            // Reiniciar timer
            startTimer();
        }

            const select = document.getElementById('reviewListSelect');

            if (vocabulary.length === 0) return;

            // Cargar palabras falladas desde localStorage
            loadFailedWords();

            // Añadir opción para repasar palabras falladas si hay alguna
            if (failedWords.length > 0) {
                const failedOption = document.createElement('option');
                failedOption.value = 'failed';
                failedOption.textContent = `📚 Palabras Falladas (${failedWords.length})`;
                select.appendChild(failedOption);
            }

            const wordsPerList = 25;
            const totalLists = Math.ceil(vocabulary.length / wordsPerList);

            for (let i = 0; i < totalLists; i++) {
                const startIndex = i * wordsPerList;
                const endIndex = Math.min(startIndex + wordsPerList - 1, vocabulary.length - 1);
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Listado ${i + 1}: Palabras ${startIndex + 1}-${endIndex + 1}`;
                select.appendChild(option);

        function saveFailedWord() {
            if (currentIndex < 0 || currentIndex >= vocabulary.length) return;

            const word = vocabulary[currentIndex];
            const wordKey = `${savedLevel}_${currentIndex}`;

            // Cargar palabras falladas actuales
            loadFailedWords();

            // Verificar si ya está guardada
            const alreadySaved = failedWords.some(fw => fw.level === savedLevel && fw.index === currentIndex);

            if (!alreadySaved) {
                // Guardar la palabra fallada
                failedWords.push({
                    level: savedLevel,
                    index: currentIndex,
                    origin: word.origin,
                    result: word.result
                });

                // Guardar en localStorage
                localStorage.setItem('popquiz_failedWords', JSON.stringify(failedWords));

                // Actualizar el selector de repaso
                populateReviewSelector();

                // Feedback visual
                const btn = document.getElementById('saveFailedBtn');
                const originalText = btn.textContent;
                btn.textContent = '✅';
                btn.style.background = 'rgba(0, 255, 0, 0.3)';

                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 1000);
            } else {
                // Si ya está guardada, dar feedback
                const btn = document.getElementById('saveFailedBtn');
                const originalText = btn.textContent;
                btn.textContent = '✓';
                setTimeout(() => {
                    btn.textContent = originalText;

        // Inicializar audio y timer
        document.addEventListener('DOMContentLoaded', async function() {
            setupWakeLock();

            // Cargar el vocabulario desde el archivo
            console.log('Selected level:', savedLevel);
            const fileCandidates = getCandidateFilesForLevel(savedLevel);
            console.log('Dataset candidates:', fileCandidates);

            try {
                const { vocab: loadedVocab, source } = await loadVocabularyFromFirstAvailable(fileCandidates);
                console.log('Vocabulary source selected:', source);

                if (!loadedVocab || loadedVocab.length === 0) {
                    document.getElementById('originWord').textContent = 'Error: No se pudo cargar el vocabulario';
                    return;
                }

                vocabulary = loadedVocab;
                currentIndex = Math.floor(Math.random() * vocabulary.length);

                // Reinicializar el conjunto de palabras usadas con la palabra actual
                usedIndices = new Set([currentIndex]);

                // Actualizar la palabra actual
                document.getElementById('originWord').textContent = vocabulary[currentIndex].origin;
                document.getElementById('resultWord').textContent = vocabulary[currentIndex].result;

                // Actualizar nivel mostrado
                const levelDisplay = levelNames[savedLevel] || savedLevel;
                document.getElementById('currentLevel').textContent = levelDisplay;

                // Cargar palabras falladas
                loadFailedWords();

                // Poblar el selector de listados de repaso
                populateReviewSelector();

                // Inicializar el timer y modo automático
                // Cargar configuración desde localStorage
                const savedMode = localStorage.getItem('popquiz_mode');
                if (savedMode === 'auditory') {
                    // Activar modo auditivo si se guardó
                    auditoryMode = true;
                    const auditoryBtn = document.getElementById('auditoryBtn');
                    auditoryBtn.textContent = 'Modo Visual';
                    auditoryBtn.style.background = 'rgba(0, 255, 0, 0.3)';
                }

                // Cargar tiempo de respuesta guardado
                const savedResponseTime = localStorage.getItem('popquiz_responseTime');
                if (savedResponseTime) {
                    responseTime = parseInt(savedResponseTime);
                    const responseTimeSelect = document.getElementById('responseTime');
                    responseTimeSelect.value = savedResponseTime;
                }

                // Actualizar el tiempo inicial según el modo
                const initialDelaySeconds = auditoryMode ? (responseTime + 4) : responseTime;
                timeLeft = initialDelaySeconds;
                document.getElementById('timeLeft').textContent = initialDelaySeconds;

                startTimer();
            } catch (error) {
                document.getElementById('originWord').textContent = 'Error al cargar el vocabulario';
                console.error('Error loading vocabulary:', error);
            }
        });

        // Atajos de teclado
        document.addEventListener('keydown', function(event) {
            // Evitar el atajo si el usuario está escribiendo en un input o select
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'SELECT' || event.target.tagName === 'TEXTAREA') {
                return;
            }

            // Barra espaciadora: mostrar resultado si no está visible, o play/pausar si ya está visible
            if (event.key === ' ') {
                event.preventDefault();
                const resultWord = document.getElementById('resultWord');
                if (resultWord.classList.contains('show')) {
                    // Si la respuesta ya está visible, play/pausar
                    togglePlayPause();
                } else {
                    // Si la respuesta no está visible, mostrarla
                    showAnswer();
                }
            }

            // Flecha derecha para siguiente palabra
            if (event.key === 'ArrowRight') {
                event.preventDefault();
                nextWord();
            }
        });
    </script>
</body>

</html>
